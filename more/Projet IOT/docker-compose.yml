version: '3.8'

services:
  # Broker MQTT Mosquitto
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Node.js
  backend:
    build:
      context: ./digital-twin-backend
      dockerfile: Dockerfile
    container_name: iot_backend
    ports:
      - "3000:3000"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iot_network
    environment:
      - NODE_ENV=production

  # Frontend React (avec build intégré)
  frontend:
    build:
      context: ./digital-twin-frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mosquitto_data:
  mosquitto_log:
  backend_logs:

networks:
  iot_network:
    driver: bridge
